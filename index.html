<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroBound IDE</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <!-- Syntax Highlighting -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- KaTeX for LaTeX math -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <style>
        :root {
            --bg: #0a0b14;
            --sidebar-bg: #0d0e1a;
            --chat-bg: #0c0d1b;
            --editor-bg: #020308;
            --header-bg: #080914;
            --tab-bar-bg: #06070e;
            --terminal-bg: #000204;
            --border: #1a1c2e;
            --border-bright: #252840;
            --accent: #7c6ff7;
            --accent-dim: rgba(124, 111, 247, 0.12);
            --text-main: #e2e4f0;
            --text-dim: #5a6080;
            --success: #10b981;
            --danger: #f87171;
            --warning: #f59e0b;
            --sidebar-w: 270px;
            --chat-w: 390px;
        }

        .agent-tag {
            display: inline-block;
            background-color: #252840;
            color: #d63384;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            padding: 1px 5px;
            border-radius: 4px;
            margin: 0 2px;
            border: 1px solid rgba(214, 51, 132, 0.3);
            text-transform: uppercase;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: transparent;
            border-radius: 10px;
            transition: .2s;
        }

        *:hover::-webkit-scrollbar-thumb {
            background: #252840;
        }

        *:hover::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            height: 50px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-bright);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            flex-shrink: 0;
            z-index: 200;
        }

        .brand {
            font-weight: 700;
            font-size: 16px;
        }

        .brand span {
            color: var(--accent);
        }

        .status-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid var(--border-bright);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-online .status-dot {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .status-offline .status-dot {
            background: var(--danger);
        }

        .status-connecting .status-dot {
            background: var(--warning);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from {
                opacity: 0.4;
            }

            to {
                opacity: 1;
            }
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 7px;
            font-size: 13px;
            font-family: inherit;
            transition: .15s;
            color: var(--text-dim);
        }

        .btn:hover {
            background: rgba(255, 255, 255, .06);
            color: var(--text-main);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #8c82ff;
        }

        /* LAYOUT */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR */
        aside.sidebar {
            width: var(--sidebar-w);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-bright);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: 2px 0 20px rgba(0, 0, 0, .5);
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-bright);
            background: #0b0c18;
            flex-shrink: 0;
        }

        .sidebar-tab {
            flex: 1;
            padding: 10px 6px;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            color: var(--text-dim);
            border-bottom: 2px solid transparent;
            transition: .15s;
            margin-top: 2px;
        }

        .sidebar-tab:hover {
            color: var(--text-main);
        }

        .sidebar-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Explorer header with hover actions */
        .explorer-header {
            height: 32px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .explorer-header .panel-title {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
        }

        .explorer-actions {
            display: none;
            gap: 2px;
            margin-left: auto;
        }

        .explorer-header:hover .explorer-actions {
            display: flex;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 5px;
            font-size: 13px;
            line-height: 1;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, .08);
            color: var(--text-main);
        }

        #explorerPanel,
        #historyPanel {
            flex: 1;
            overflow-y: auto;
        }

        /* Tree */
        .tree-folder {
            cursor: pointer;
        }

        .tree-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 0;
            cursor: pointer;
            font-size: 13px;
            border-radius: 5px;
            transition: background .1s;
            color: var(--text-main);
            padding-right: 8px;
        }

        .tree-item:hover {
            background: rgba(124, 111, 247, .1);
        }

        .tree-item.active {
            background: rgba(124, 111, 247, .18);
            color: var(--accent);
        }

        .tree-children {
            overflow: hidden;
            transition: max-height .2s;
        }

        .tree-children.collapsed {
            max-height: 0 !important;
        }

        /* EDITOR AREA */
        main.content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--editor-bg);
            overflow: hidden;
            min-width: 200px;
            position: relative;
        }

        /* FILE TABS */
        .file-tabs-bar {
            height: 37px;
            background: var(--tab-bar-bg);
            border-bottom: 1px solid var(--border-bright);
            display: flex;
            align-items: flex-end;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .file-tabs-bar::-webkit-scrollbar {
            height: 3px;
        }

        .file-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 14px;
            height: 100%;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-dim);
            border-right: 1px solid var(--border);
            white-space: nowrap;
            flex-shrink: 0;
            border-bottom: 2px solid transparent;
            transition: .15s;
            position: relative;
        }

        .file-tab:hover {
            background: rgba(255, 255, 255, .04);
            color: var(--text-main);
        }

        .file-tab.active {
            background: var(--editor-bg);
            color: var(--text-main);
            border-bottom-color: var(--accent);
        }

        .file-tab .tab-icon {
            font-size: 12px;
        }

        .file-tab .tab-name {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-tab .tab-close {
            opacity: 0;
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1;
            border-radius: 3px;
            padding: 1px 3px;
            transition: .1s;
        }

        .file-tab:hover .tab-close,
        .file-tab.active .tab-close {
            opacity: 1;
        }

        .file-tab .tab-close:hover {
            background: rgba(255, 255, 255, .15);
            color: var(--danger);
        }

        #monacoContainer {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* EDITOR TOOLBAR */
        .editor-toolbar {
            height: 32px;
            background: #0c0d1b;
            border-bottom: 1px solid var(--border-bright);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px;
            z-index: 100;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 4px;
            border-right: 1px solid var(--border);
            padding-right: 8px;
            margin-right: 4px;
        }

        .toolbar-group:last-child {
            border-right: none;
        }

        .toolbar-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
            transition: .15s;
            font-family: 'JetBrains Mono';
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toolbar-btn:hover {
            background: rgba(255, 255, 255, .08);
            color: var(--text-main);
        }

        .toolbar-btn.active {
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* MARKDOWN SPLIT PREVIEW */
        .editor-split-container {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        #markdownPreview {
            flex: 1;
            background: #0f101a;
            color: #d1d5db;
            padding: 25px 35px;
            overflow-y: auto;
            display: none;
            border-left: 1px solid var(--border-bright);
            font-family: 'Outfit', sans-serif;
            line-height: 1.6;
        }

        #markdownPreview h1,
        #markdownPreview h2 {
            border-bottom: 1px solid #2a2a3e;
            padding-bottom: 8px;
            margin: 20px 0 15px;
        }

        #markdownPreview blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            color: #9ca3af;
            font-style: italic;
        }

        #markdownPreview pre {
            background: #05060f;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1a1c2e;
            margin: 15px 0;
        }

        #markdownPreview code {
            font-family: 'JetBrains Mono';
            background: rgba(124, 111, 247, 0.1);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        /* IMAGE PAN/ZOOM */
        #imgViewport {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020308;
            cursor: grab;
        }

        #imgViewport:active {
            cursor: grabbing;
        }

        #imageViewerImg {
            transition: transform 0.05s ease-out;
            transform-origin: center;
            will-change: transform;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* TERMINAL SECTION */
        .terminal-section {
            background: var(--terminal-bg);
            border-top: 1px solid var(--border-bright);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 240px;
        }

        body.terminal-hidden .terminal-section {
            display: none;
        }

        .terminal-tabs-bar {
            height: 35px;
            background: #030408;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 6px;
            gap: 2px;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .terminal-tabs-bar::-webkit-scrollbar {
            height: 2px;
        }

        .term-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 6px 6px 0 0;
            font-size: 11px;
            cursor: pointer;
            color: var(--text-dim);
            border: 1px solid transparent;
            border-bottom: none;
            flex-shrink: 0;
        }

        .term-tab:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, .04);
        }

        .term-tab.active {
            background: var(--terminal-bg);
            border-color: var(--border);
            color: var(--text-main);
        }

        .term-tab .term-tab-close {
            opacity: 0;
            font-size: 11px;
        }

        .term-tab:hover .term-tab-close,
        .term-tab.active .term-tab-close {
            opacity: 1;
        }

        .term-tab .term-tab-close:hover {
            color: var(--danger);
        }

        .new-term-btn {
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 14px;
            color: var(--text-dim);
            cursor: pointer;
            margin-left: 4px;
        }

        .new-term-btn:hover {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .terminal-body-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .terminal-body {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            padding: 10px 14px;
            font-family: 'JetBrains Mono';
            font-size: 12px;
            line-height: 1.6;
            display: none;
        }

        .terminal-body.active {
            display: block;
        }

        .terminal-input-row {
            height: 38px;
            background: #02030a;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            flex-shrink: 0;
        }

        #termInput {
            flex: 1;
            background: transparent;
            border: none;
            color: #c8d3f5;
            font-family: 'JetBrains Mono';
            font-size: 12px;
            outline: none;
        }

        /* RESIZERS */
        .resizer-v {
            width: 3px;
            cursor: col-resize;
            background: transparent;
            flex-shrink: 0;
            transition: .15s;
        }

        .resizer-v:hover {
            background: var(--accent);
        }

        .resizer-h {
            height: 3px;
            cursor: row-resize;
            background: var(--border);
            flex-shrink: 0;
            transition: .15s;
        }

        .resizer-h:hover {
            background: var(--accent);
        }

        /* === CLAUDE-STYLE CHAT PANEL === */
        aside.chat {
            width: var(--chat-w);
            background: #1c1c1f;
            border-left: 1px solid #2a2a2e;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        /* Plain assistant message */
        .chat-entry {
            padding: 18px 20px;
            border-bottom: 1px solid #26262a;
        }

        .chat-entry:last-child {
            border-bottom: none;
        }

        .chat-role-label {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-role-label.user {
            color: #a0a0b0;
            justify-content: flex-end;
        }

        .chat-role-label.assistant {
            color: #5a8f7b;
        }

        .chat-text {
            font-size: 14px;
            line-height: 1.7;
            color: #d4d4d8;
        }

        .chat-text.user {
            color: #e8e8f0;
            text-align: right;
        }

        .chat-text p {
            margin: 0 0 10px;
        }

        .chat-text p:last-child {
            margin: 0;
        }

        .chat-text strong {
            color: #f0f0f5;
            font-weight: 600;
        }

        .chat-text em {
            color: #a0b4c8;
        }

        .chat-text a {
            color: #7c9eff;
            text-decoration: none;
        }

        .chat-text a:hover {
            text-decoration: underline;
        }

        .chat-text ul,
        .chat-text ol {
            margin: 6px 0;
            padding-left: 22px;
        }

        .chat-text li {
            margin: 4px 0;
        }

        .chat-text pre {
            background: #111113;
            border: 1px solid #2a2a2e;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            margin: 10px 0;
        }

        .chat-text code {
            font-family: 'JetBrains Mono';
            font-size: 12px;
            background: #26262a;
            padding: 1px 5px;
            border-radius: 4px;
            color: #c9d1d9;
        }

        .chat-text img {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 8px;
            display: block;
        }

        .chat-text h1,
        .chat-text h2,
        .chat-text h3,
        .chat-text h4 {
            margin: 12px 0 6px;
            color: #e8e8f0;
            font-weight: 600;
        }

        .chat-text table {
            border-collapse: collapse;
            width: 100%;
            font-size: 13px;
            margin: 10px 0;
        }

        .chat-text th,
        .chat-text td {
            border: 1px solid #2a2a2e;
            padding: 6px 10px;
        }

        .chat-text th {
            background: #26262a;
            color: #a0a0b0;
        }

        .chat-text blockquote {
            border-left: 3px solid #3a3a42;
            margin: 8px 0;
            padding: 4px 12px;
            color: #8a8a9a;
        }

        /* Collapsible thought row */
        .thought-row {
            padding: 6px 20px;
            border-bottom: 1px solid #22222a;
        }

        .thought-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #8a8a9a;
            user-select: none;
            padding: 4px 0;
            border-radius: 4px;
            width: 100%;
            background: none;
            border: none;
            text-align: left;
        }

        .thought-toggle:hover {
            color: #b0b0c0;
        }

        .thought-toggle .toggle-arrow {
            font-size: 10px;
            transition: transform .2s;
            flex-shrink: 0;
        }

        .thought-toggle.open .toggle-arrow {
            transform: rotate(90deg);
        }

        .thought-body {
            display: none;
            margin-top: 6px;
            padding: 10px 12px;
            background: #111113;
            border: 1px solid #2a2a2e;
            border-radius: 8px;
            font-family: 'JetBrains Mono';
            font-size: 11px;
            color: #7a8099;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .thought-body.visible {
            display: block;
        }

        /* File diff badges */
        .file-diff-bar {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px 0 4px;
        }

        .file-diff-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            padding: 5px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background .15s;
        }

        .file-diff-item:hover {
            background: #26262a;
        }

        .file-diff-icon {
            font-size: 14px;
            flex-shrink: 0;
        }

        .file-diff-name {
            color: #c9d1d9;
            font-family: 'JetBrains Mono';
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-diff-path {
            color: #555560;
            font-size: 10px;
            font-family: 'JetBrains Mono';
            flex-shrink: 0;
        }

        .diff-adds {
            color: #3fb950;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .diff-dels {
            color: #f85149;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* Accept/Reject sticky bar */
        .review-action-bar {
            border-top: 1px solid #2a2a2e;
            padding: 8px 16px;
            background: #1c1c1f;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .review-bar-label {
            font-size: 12px;
            color: #8a8a9a;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-accept-all {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 7px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-accept-all:hover {
            background: #3b82f6;
        }

        .btn-reject-all {
            background: none;
            color: #8a8a9a;
            border: none;
            padding: 6px 10px;
            border-radius: 7px;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-reject-all:hover {
            background: #26262a;
            color: #d4d4d8;
        }

        /* Input area — Claude-style */
        .input-container {
            padding: 12px 14px;
            border-top: 1px solid #2a2a2e;
            background: #1c1c1f;
        }

        .image-previews {
            display: flex;
            gap: 8px;

<body>

    <header>

    <script>
        let ws, monacoEditor, currentWS, activeThought = null;
        const WS_PORTS = [8001, 8010, 8011];
        let currentWsPort = Number(localStorage.getItem('leanAgentPort')) || WS_PORTS[0];
        let reconnectTimer = null;
        let pendingImages = [];
        let openFiles = [];
        let activeFilePath = null;
        let terminals = [];
        let activeTerminalId = null;
        let termCounter = 0;
        let thinkStartTime = null;
        let currentZoom = 13;
        let mdPreviewActive = false;
        let imgScale = 1;
        let imgPos = { x: 0, y: 0 };
        let imgDragging = false;
        let imgStart = { x: 0, y: 0 };

        try {
            if (typeof marked !== 'undefined') {
                marked.setOptions({
                    highlight: function (code, lang) {
                        if (lang && typeof hljs !== 'undefined' && hljs.getLanguage(lang)) {
                            try { return hljs.highlight(code, { language: lang }).value; } catch (e) { }
                        }
                        return typeof hljs !== 'undefined' ? hljs.highlightAuto(code).value : code;
                    },
                    breaks: true,
                    gfm: true,
                });
            }
        } catch (e) { console.warn("Marked setup failed:", e); }

        try {
            if (typeof require !== 'undefined') {
                require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
                require(['vs/editor/editor.main'], function () {
                    monacoEditor = monaco.editor.create(document.getElementById('monacoContainer'), {
                        value: '',
                        language: 'javascript',
                        theme: 'vs-dark',
                        automaticLayout: true,
                        padding: { top: 14 },
                        lineNumbers: 'on',
                        mouseWheelZoom: true,
                        scrollBeyondLastLine: false,
                        wordWrap: "on"
                    });
                    monacoEditor.onDidChangeModelContent(() => {
                        if (activeFilePath && activeFilePath.endsWith('.md')) {
                            updateMdPreview();
                        }
                        if (activeFilePath) {
                            const tab = openFiles.find(f => f.path === activeFilePath);
                            if (tab) tab.content = monacoEditor.getValue();
                        }
                    });
                });
            }
        } catch (e) {
            console.warn("Monaco setup failed:", e);
        }

        // Strip any leaked structured-output tags from agent content
        function stripAgentTags(text) {
            if (!text) return '';
            // Non-destructive passthrough: renderMarkdown handles the actual escaping/styling.
            // This function is kept for backward compatibility but no longer strips.
            return text;
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, (char) => {
                if (char === '&') return '&amp;';
                if (char === '<') return '&lt;';
                if (char === '>') return '&gt;';
                return char;
            });
        }

        function renderMarkdown(text) {
            if (typeof marked === 'undefined') return text || '';
            
            // 1. Strip XML-like tags if present
            let cleanText = (text || '').replace(/<\/?REPORT>/gi, '').trim();

            // 2. Detect Modular Block Protocol (Supports TRIPLE backtick fragments)
            if (cleanText.includes('```')) {
                const blockRegex = /(```+)(\w*)[^\n]*\n([\s\S]*?)\n?\1/g;
                let lastIndex = 0;
                let html = '<div class="report-container">';
                let match;
                let found = false;
                
                while ((match = blockRegex.exec(cleanText)) !== null) {
                    found = true;
                    // Content BEFORE the block (potentially the --- separator)
                    const before = cleanText.substring(lastIndex, match.index).trim();
                    if (before) {
                        if (before === '---') {
                            html += '<hr class="report-sep">';
                        } else {
                            html += renderMarkdownInternal(before);
                        }
                    }
                    
                    const [_, fence, lang, body] = match;
                    if (lang === 'markdown') {
                        // 1. Markdown Fragment: Render only the INNER content, stripping the 'markdown' header
                        // Strip the literal word "markdown" if it appears at the very beginning of the body
                        const cleanBody = body.replace(/^markdown\n?/i, '');
                        html += renderMarkdownInternal(cleanBody);
                    } else {
                        // 2. Code Block: Show raw markdown source (with backticks)
                        const fullBlock = `${fence}${lang}\n${body}\n${fence}`;
                        // Escape HTML entities to prevent rendering as HTML
                        const escapedBlock = escapeHtml(fullBlock);
                        html += `<pre class="raw-code-block">${escapedBlock}</pre>`;
                    }
                    lastIndex = blockRegex.lastIndex;
                }
                
                // Content AFTER all blocks
                const after = cleanText.substring(lastIndex).trim();
                if (after) {
                    if (after === '---') {
                        html += '<hr class="report-sep">';
                    } else {
                        html += renderMarkdownInternal(after);
                    }
                }
                
                html += '</div>';
                if (found) return html;
            }
            
            // Fallback for standard markdown
            return renderMarkdownInternal(cleanText);
        }

        function renderMarkdownInternal(text) {
            if (typeof marked === 'undefined') return text || '';

            // STEP 1: Escape agent tags to prevent stripping
            let escaped = (text || '')
                .replace(/<(THINK|REPORT|REINFORCEMENT)>/gi, '&lt;$1&gt;')
                .replace(/<\/(THINK|REPORT|REINFORCEMENT)>/gi, '&lt;/$1&gt;');

            // STEP 2: Protect LaTeX math
            const mathBlocks = [];
            let processed = escaped
                .replace(/\$\$([\s\S]+?)\$\$/g, (_, math) => {
                    mathBlocks.push({ type: 'block', math });
                    return `<MATHBLOCK${mathBlocks.length - 1}>`;
                })
                .replace(/(?<!\w)\$([^\$\n]+?)\$(?!\w)/g, (_, math) => {
                    mathBlocks.push({ type: 'inline', math });
                    return `<MATHINLINE${mathBlocks.length - 1}>`;
                });

            // STEP 3: Configure marked for proper code blocks
            const renderer = new marked.Renderer();
            renderer.code = (code, language) => {
                // Optional: Add syntax highlighting with hljs
                if (typeof hljs !== 'undefined' && language && hljs.getLanguage(language)) {
                    try {
                        const highlighted = hljs.highlight(code, { language }).value;
                        return `<pre><code class="hljs language-${language}">${highlighted}</code></pre>`;
                    } catch (e) {}
                }
                // Fallback to plain code block
                return `<pre><code class="language-${language || 'text'}">${escapeHtml(code)}</code></pre>`;
            };

            // STEP 4: Parse markdown
            let html = marked.parse(processed, { renderer });

            // STEP 5: Restore math
            if (typeof katex !== 'undefined') {
                html = html.replace(/<MATHBLOCK(\d+)>/g, (_, i) => {
                    try { return katex.renderToString(mathBlocks[i].math, { displayMode: true, throwOnError: false }); } 
                    catch (e) { return mathBlocks[i].math; }
                }).replace(/<MATHINLINE(\d+)>/g, (_, i) => {
                    try { return katex.renderToString(mathBlocks[i].math, { displayMode: false, throwOnError: false }); } 
                    catch (e) { return '$' + mathBlocks[i].math + '$'; }
                });
            }

            // STEP 6: Restore agent tags as styled spans
            html = html.replace(/&lt;(THINK|REPORT|REINFORCEMENT)&gt;/gi, '<span class="agent-tag">&lt;$1&gt;</span>');
            html = html.replace(/&lt;\/(THINK|REPORT|REINFORCEMENT)&gt;/gi, '<span class="agent-tag">&lt;/$1&gt;</span>');

            return html;
        }

        // ===== WEBSOCKET =====
        function updateStatus(state, port = currentWsPort) {
            const chip = document.getElementById('connStatus');
            const txt = document.getElementById('statusText');
            chip.className = 'status-chip status-' + state;
            if (state === 'online') txt.innerText = `Connected :${port}`;
            else if (state === 'connecting') txt.innerText = `Connecting :${port}`;
            else txt.innerText = 'Disconnected';
        }

        function getWebSocketUrl(port = currentWsPort) {
            const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
            const host = window.location.hostname || '127.0.0.1';
            return `${protocol}://${host}:${port}/ws`;
        }

        function getNextWsPort(port) {
            const idx = WS_PORTS.indexOf(port);
            return WS_PORTS[(idx + 1) % WS_PORTS.length];
        }

        function connect() {
            clearTimeout(reconnectTimer);
            const port = currentWsPort;
            let receivedHandshake = false;

            updateStatus('connecting', port);
            ws = new WebSocket(getWebSocketUrl(port));
            ws.onopen = () => {
                // Wait for the first application message before marking the bridge healthy.
            };
            ws.onmessage = (e) => {
                if (!receivedHandshake) {
                    receivedHandshake = true;
                    currentWsPort = port;
                    localStorage.setItem('leanAgentPort', String(port));
                    updateStatus('online', port);
                }
                handleEvent(JSON.parse(e.data));
            };
            ws.onclose = () => {
                updateStatus('offline');
                currentWsPort = receivedHandshake ? port : getNextWsPort(port);
                reconnectTimer = setTimeout(connect, receivedHandshake ? 3000 : 600);
            };
            ws.onerror = () => {
                if (!receivedHandshake) {
                    try { ws.close(); } catch (_) { }
                }
            };
        }

            else if (data.type === "direct_terminal_result") {

        function renderTree(node) {
            const container = document.getElementById('fileTree');
            const frag = document.createDocumentFragment();
            function walk(n, parent, depth) {
                if (n.type === 'folder') {
                    const wrapper = document.createElement('div');
                    const header = document.createElement('div'); header.className = 'tree-item tree-folder';
                    header.style.paddingLeft = (10 + depth * 14) + 'px';
                    header.innerHTML = `<span class="folder-arrow" style="font-size:9px;transition:.15s">▶</span><span>📂</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.name}</span>`;
                    const children = document.createElement('div'); children.className = 'tree-children collapsed';
                    header.onclick = (e) => {
                        e.stopPropagation();
                        const collapsed = children.classList.toggle('collapsed');
                        header.querySelector('.folder-arrow').textContent = collapsed ? '▶' : '▼';
                        if (!collapsed) children.style.maxHeight = '9999px';
                    };
                    wrapper.appendChild(header); wrapper.appendChild(children);
                    parent.appendChild(wrapper);
                    if (n.children) n.children.forEach(c => walk(c, children, depth + 1));
                } else {
                    const el = document.createElement('div'); el.className = 'tree-item';
                    el.style.paddingLeft = (10 + depth * 14) + 'px';
                    el.dataset.path = n.path;
                    const name = n.name;
                    const ext = name.split('.').pop().toLowerCase();
                    const imageExts = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'bmp', 'ico'];
                    el.innerHTML = `<span>${getFileIcon(name)}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>`;

                    // Single click = select (highlight only)
                    el.onclick = (e) => {
                        e.stopPropagation();
                        document.querySelectorAll('.tree-item').forEach(x => x.classList.remove('active'));
                        el.classList.add('active');
                    };
                    // Double click = open file in editor/viewer
                    el.ondblclick = (e) => {
                        e.stopPropagation();
                        document.querySelectorAll('.tree-item').forEach(x => x.classList.remove('active'));
                        el.classList.add('active');
                        // Normalize path to use forward slashes for consistency
                        const normalizedPath = n.path.replace(/\\/g, '/');
                        ws.send(JSON.stringify({ type: 'get_file', path: normalizedPath }));
                    };
                    parent.appendChild(el);
                }
            }
            walk(node, frag, 0);
            container.innerHTML = '';
            container.appendChild(frag);
        }

        // ===== SIDEBAR =====
        function switchSidebar(tab, el) {
            document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active')); el.classList.add('active');
            document.getElementById('explorerPanel').style.display = tab === 'explorer' ? 'flex' : 'none';
            document.getElementById('historyPanel').style.display = tab === 'history' ? 'block' : 'none';
        }

        // ===== CHAT =====
        let pendingReviews = []; // Track pending review cards

        function renderMsg(role, content, images = []) {
            const entry = document.createElement('div');
            entry.className = 'chat-entry';
            const isUser = role === 'user';
            let imgHTML = images.map(s => `<img src="${s}">`).join('');
            const renderedContent = isUser
                ? `<span style="white-space:pre-wrap">${(content || '').replace(/</g, '&lt;')}</span>`
                : renderMarkdown(content || '');
            entry.innerHTML = `
        <div class="chat-role-label ${role}">${isUser ? '👤 You' : '⚛️ ZeroBound agent'}</div>
        <div class="chat-text ${role} md-body">${imgHTML}${renderedContent}</div>
    `;
            if (!isUser) {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '⌘ Copy';
                copyBtn.title = 'Copy response text';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(content || '').then(() => {
                        copyBtn.textContent = '✓ Copied!';
                        setTimeout(() => { copyBtn.textContent = '⌘ Copy'; }, 1800);
                    });
                };
                entry.appendChild(copyBtn);
            }
            document.getElementById('chat').appendChild(entry);
            document.getElementById('chat').scrollTop = 99999;
        }

        let thoughtTimers = {};

        function addThought(tool) {
            const startTime = Date.now();
            const row = document.createElement('div'); row.className = 'thought-row'; row.dataset.tool = tool;

            const toggleBtn = document.createElement('button'); toggleBtn.className = 'thought-toggle';
            toggleBtn.innerHTML = `<span class="toggle-arrow">▶</span><span class="pulse-icon" style="color:#8a8a9a">⚡</span><span class="thought-label">Running ${tool}...</span>`;

            const body = document.createElement('div'); body.className = 'thought-body';
            body.textContent = 'Initializing...';

            toggleBtn.onclick = () => {
                toggleBtn.classList.toggle('open');
                body.classList.toggle('visible');
            };
            row.appendChild(toggleBtn); row.appendChild(body);
            document.getElementById('chat').appendChild(row);
            document.getElementById('chat').scrollTop = 99999;

            thoughtTimers[tool + '_start'] = startTime;
            return row;
        }

        function finalizeThought(row, res, ml = []) {
            const tn = row.dataset.tool || 'Op';
            const isErr = res.error || (res.code !== undefined && res.code !== 0);
            const elapsed = Math.round((Date.now() - (thoughtTimers[tn + '_start'] || Date.now())) / 1000);
            const label = elapsed > 0 ? `${elapsed}s` : '<1s';

            const toggle = row.querySelector('.thought-toggle');
            const body = row.querySelector('.thought-body');
            const statusIcon = isErr ? '✖' : '✓';
            const statusColor = isErr ? '#f85149' : '#5a8f7b';
            toggle.innerHTML = `<span class="toggle-arrow">▶</span><span style="color:${statusColor}">${statusIcon}</span><span style="color:#8a8a9a">Worked for ${label} ›</span>`;
            body.textContent = res.stdout || res.stderr || res.error || (res.status === 'success' ? 'Done.' : 'Completed.');

            // File diff badges
            if (ml && ml.length > 0) {
                const diffBar = document.createElement('div'); diffBar.className = 'file-diff-bar';
                ml.forEach(f => {
                    const fname = f.split('/').pop().split('\\').pop();
                    const fpath = '...' + f.slice(-30);
                    const item = document.createElement('div'); item.className = 'file-diff-item';
                    item.innerHTML = `<span class="file-diff-icon">${getFileIconForName(fname)}</span><span class="file-diff-name">${fname}</span><span class="diff-adds">+?</span><span class="file-diff-path">${fpath}</span>`;
                    item.onclick = () => ws.send(JSON.stringify({ type: 'get_file', path: f.replace(/\\/g, '/') }));
                    diffBar.appendChild(item);
                });
                row.appendChild(diffBar);
            }
        }

        function getFileIconForName(name) {
            const e = name.split('.').pop().toLowerCase();
            return { py: '🐍', js: '📜', ts: '📘', html: '🌐', css: '🎨', json: '⚙️', md: '📝', sh: '⚡', bat: '⚡', ps1: '⚡', yml: '⚙️' }[e] || '📄';
        }

        // Active review tracking
        let activeReviewCard = null;
        let pendingReviewCard = null;

        function renderReviewCard(data) {
            const fname = data.args && data.args.path ? data.args.path.split('/').pop().split('\\').pop() : data.tool;
            const fpath = data.args && data.args.path ? '...' + data.args.path.slice(-35) : '';

            // Show sticky bar
            document.getElementById('reviewBarLabel').textContent = `${fname} · waiting for review`;
            document.getElementById('reviewActionBar').style.display = 'flex';

            // Render diff inside a thought-row style card
            const row = document.createElement('div'); row.className = 'thought-row chat-entry'; row.id = 'activeReviewRow';
            row.style.borderLeft = '3px solid #f59e0b';

            let diff = data.diff
                ? data.diff.split('\n').map(l =>
                    `<span style="color:${l.startsWith('+') ? '#3fb950' : l.startsWith('-') ? '#f85149' : '#555568'}">${l.replace(/</g, '&lt;')}\n</span>`
                ).join('')
                : (data.args && data.args.command ? `<span style="color:#e5c07b;white-space:pre-wrap;">${data.args.command.replace(/</g, '&lt;')}</span>` : 'No diff available.');

            // File badge header
            const header = document.createElement('div');
            header.style.cssText = 'display:flex;align-items:center;gap:8px;padding:4px 0 8px;font-size:12px;';
            header.innerHTML = `<span style="color:#f59e0b">🛠</span><span class="file-diff-name" style="color:#c9d1d9">${fname}</span><span class="file-diff-path">${fpath}</span>`;

            const diffBox = document.createElement('div');
            diffBox.style.cssText = 'background:#111113;border:1px solid #2a2a2e;border-radius:8px;padding:10px 12px;font-family:\'JetBrains Mono\';font-size:10px;max-height:220px;overflow-y:auto;white-space:pre;';
            diffBox.innerHTML = diff;

            const btnRow = document.createElement('div');
            btnRow.style.cssText = 'display:flex;gap:8px;margin-top:10px;';
            btnRow.innerHTML = `<button class="btn-accept-all" style="flex:1" onclick="decide(true,this)">✓ Accept</button><button class="btn-reject-all" style="border:1px solid #3a3a42;flex:1" onclick="decide(false,this)">✕ Reject</button>`;

            row.appendChild(header); row.appendChild(diffBox); row.appendChild(btnRow);
            document.getElementById('chat').appendChild(row);
            document.getElementById('chat').scrollTop = 99999;
            activeReviewCard = row;

            // Hide global loader while waiting for user
            const loader = document.getElementById('globalLoader');
            if (loader) loader.style.display = 'none';
        }

        function decide(v, b) {
            const row = b.closest('.thought-row');
            const icon = v ? '⚡' : '✗';
            const color = v ? '#3fb950' : '#f85149';
            const label = v ? 'Applying changes...' : 'Rejected';
            row.querySelector('div').innerHTML = `<span style="color:${color}" class="${v ? 'pulse-icon' : ''}">${icon}</span> <span style="color:#8a8a9a">${label}</span>`;
            row.querySelectorAll('div:not(:first-child)').forEach(e => e.remove());
            document.getElementById('reviewActionBar').style.display = 'none';
            ws.send(JSON.stringify({ type: 'approval_decision', decision: v }));

            // Clear waiting tags
            const lastThink = document.getElementById('last-think-row');
            if (lastThink) {
                const btn = lastThink.querySelector('.think-toggle');
                if (btn) {
                    btn.classList.remove('pending');
                    const tag = btn.querySelector('.pend-tag');
                    if (tag) tag.remove();
                }
                lastThink.id = ''; // Unmark it
            }

            if (v) pendingReviewCard = row;
            activeReviewCard = null;

            // Restore global loader if agent is still running
            if (agentRunning) {
                const loader = document.getElementById('globalLoader');
                if (loader) {
                    loader.style.display = 'block';
                    document.getElementById('chat').appendChild(loader);
                    document.getElementById('chat').scrollTop = 99999;
                }
            }
        }

        function decideAll(v) {
            if (activeReviewCard) {
                const btn = activeReviewCard.querySelector(v ? '.btn-accept-all' : '.btn-reject-all');
                if (btn) decide(v, btn);
            }
        }
        function timeAgo(dateString) {
            if (!dateString) return '';
            const diff = Math.floor((new Date() - new Date(dateString)) / 1000);
            if (diff < 60) return `${diff}s ago`;
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            return `${Math.floor(diff / 86400)}d ago`;
        }

        function renderHistory(sessions) {
            const h = document.getElementById('historyPanel'); h.innerHTML = '';
            if (!sessions.length) { h.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-dim);font-size:13px">No saved sessions</div>'; return; }

            const frag = document.createDocumentFragment();
            sessions.forEach(s => {
                const title = s.title || s.workspace.split('\\').pop().split('/').pop() || s.workspace;
                let urlBadge = '';
                if (s.deepseek_url) {
                    urlBadge = `<div class="h-link-badge" onclick="window.open('${s.deepseek_url}', '_blank'); event.stopPropagation();" title="${s.deepseek_url}">
                <span>🔗</span><span class="h-url-text">${s.deepseek_url.replace('https://', '').replace('chat.deepseek.com/a/chat/s/', '')}</span>
            </div>`;
                }

                const d = document.createElement('div'); d.className = 'history-item';
                d.innerHTML = `
            <div class="h-header" onclick="loadSession('${s.session_id}', event)">
                <div class="h-title" title="${s.workspace}">📁 ${title}</div>
                <div class="h-date">${timeAgo(s.updated_at)}</div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center">
                ${urlBadge}
            </div>
            <button class="h-del-btn" onclick="deleteSession('${s.session_id}', event)" title="Delete session">🗑</button>
        `;
                frag.appendChild(d);
            });
            h.appendChild(frag);
        }

        function loadSession(sid, e) {
            if (e) e.stopPropagation();
            if (confirm('Load this session?')) ws.send(JSON.stringify({ type: 'load_history', session_id: sid }));
        }
        function deleteSession(sid, e) {
            if (e) e.stopPropagation();
            if (confirm('Delete this session permanently?')) ws.send(JSON.stringify({ type: 'delete_history', session_id: sid }));
        }

        function showToast(msg, duration = 2500) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), duration);
        }

        function saveSession() {
            ws.send(JSON.stringify({ type: 'save_session' }));
        }

        // ===== SEND / STOP TOGGLE =====
        let agentRunning = false;

        function setAgentRunning(running) {
            agentRunning = running;
            const btn = document.getElementById('sendBtn');
            const prompt = document.getElementById('prompt');
            const chat = document.getElementById('chat');

            let loader = document.getElementById('globalLoader');
            if (!loader) {
                loader = document.createElement('div');
                loader.id = 'globalLoader';
                loader.style.cssText = 'padding:12px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-dim);';
                loader.innerHTML = `<span class="pulse-icon" style="color:#f59e0b">●</span> <span>Working...</span>`;
            }

            if (running) {
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="2" y="2" width="10" height="10" rx="2"/></svg>`;
                btn.title = 'Stop agent';
                btn.style.background = '#c0392b';
                btn.style.animation = 'none';
                prompt.disabled = true;
                prompt.style.opacity = '0.5';

                loader.style.display = 'flex';
                chat.appendChild(loader);
                chat.scrollTop = 99999;
            } else {
                btn.innerHTML = '➤';
                btn.title = 'Send';
                btn.style.background = '';
                btn.style.animation = '';
                prompt.disabled = false;
                prompt.style.opacity = '';
                // Clear any lingering review card
                document.getElementById('reviewActionBar').style.display = 'none';

                if (loader.parentNode) loader.parentNode.removeChild(loader);
            }
        }

        function handleSendStop() {
            if (agentRunning) {
                // STOP: tell backend to kill the task + subprocess
                ws.send(JSON.stringify({ type: 'stop_agent' }));
                setAgentRunning(false);
                // Add a stopped notice in chat
                const note = document.createElement('div');
                note.className = 'chat-entry';
                note.innerHTML = `<div style="color:#f59e0b;font-size:12px;padding:6px 0">⏹ Agent stopped by user.</div>`;
                document.getElementById('chat').appendChild(note);
                document.getElementById('chat').scrollTop = 99999;
            } else {
                sendMessage();
            }
        }

        function sendMessage() {
            const i = document.getElementById('prompt'); const v = i.value.trim();
            if (!v && pendingImages.length === 0) return;
            renderMsg('user', v, pendingImages);
            ws.send(JSON.stringify({ type: 'message', content: v, images: pendingImages }));
            thinkStartTime = Date.now(); // Start timing the first thought
            i.value = ''; i.style.height = '36px'; pendingImages = []; document.getElementById('imagePreviews').innerHTML = '';
            setAgentRunning(true);
        }

        // Auto-grow textarea + Enter to send, Shift+Enter for newline
        document.getElementById('prompt').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendStop();
            }
        });
        document.getElementById('prompt').addEventListener('input', function () {
            this.style.height = '36px';
            this.style.height = Math.min(this.scrollHeight, 160) + 'px';
        });

        function sendDirectCommand() {
            const i = document.getElementById('termInput'); const v = i.value.trim(); if (!v) return;
            const prompt = document.getElementById('termPromptDisplay').innerText;
            logToActiveTerminal(`<span style="color:var(--success)">${prompt}</span> <span style="color:#c8d3f5">${v}</span>`);
            ws.send(JSON.stringify({ type: 'direct_command', command: v })); i.value = '';
        }
        document.getElementById('termInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendDirectCommand(); });

        function toggleTerm() { document.body.classList.toggle('terminal-hidden'); }
        function resetAgent() { if (confirm('Reset session?')) { ws.send(JSON.stringify({ type: 'reset' })); location.reload(); } }
        document.getElementById('toggleTermBtn').onclick = toggleTerm;
        document.getElementById('openFolderBtn').onclick = () => ws.send(JSON.stringify({ type: 'pick_folder' }));
        document.addEventListener('keydown', e => { if (e.ctrlKey && e.key === '`') { e.preventDefault(); toggleTerm(); } });

        // ===== RESIZERS =====
        function setupVResizer(id, getTarget, side) {
            document.getElementById(id).addEventListener('mousedown', () => {
                const t = getTarget();
                function m(ev) { const w = side === 'left' ? ev.clientX : window.innerWidth - ev.clientX; if (w > 150 && w < 750) t.style.width = w + 'px'; }
                document.addEventListener('mousemove', m);
                document.addEventListener('mouseup', () => document.removeEventListener('mousemove', m), { once: true });
            });
        }
        setupVResizer('resizerV1', () => document.getElementById('sidebarEl'), 'left');
        setupVResizer('resizerV2', () => document.getElementById('chatEl'), 'right');
        document.getElementById('resizerH').addEventListener('mousedown', () => {
            function m(ev) { const h = window.innerHeight - ev.clientY; if (h > 60 && h < 600) document.getElementById('terminalPanel').style.height = h + 'px'; }
            document.addEventListener('mousemove', m);
            document.addEventListener('mouseup', () => document.removeEventListener('mousemove', m), { once: true });
        });
    </script>
</body>

</html>
